<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bob Task Orchestrator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #1e1e1e;
            color: #d4d4d4;
            padding: 16px;
            line-height: 1.6;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 12px;
            border-bottom: 1px solid #333;
        }

        .header h1 {
            font-size: 20px;
            font-weight: 600;
        }

        .mock-badge {
            display: none;
            background: #3a3a00;
            color: #f0a500;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
        }

        .mock-badge.visible {
            display: block;
        }

        .goal-input-section {
            margin-bottom: 24px;
        }

        textarea {
            width: 100%;
            min-height: 100px;
            padding: 12px;
            background: #2d2d2d;
            border: 1px solid #444;
            border-radius: 6px;
            color: #d4d4d4;
            font-family: inherit;
            font-size: 14px;
            resize: vertical;
            margin-bottom: 12px;
        }

        textarea:focus {
            outline: none;
            border-color: #7c6af7;
        }

        textarea::placeholder {
            color: #888;
        }

        .btn {
            padding: 10px 16px;
            border: none;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-primary {
            background: #7c6af7;
            color: white;
        }

        .btn-primary:hover:not(:disabled) {
            background: #6b5ce7;
        }

        .btn-secondary {
            background: #3a3a3a;
            color: #d4d4d4;
            margin-left: 8px;
        }

        .btn-secondary:hover:not(:disabled) {
            background: #4a4a4a;
        }

        .status-text {
            margin-top: 12px;
            font-size: 13px;
            color: #888;
            min-height: 20px;
        }

        .status-text.error {
            color: #f85149;
        }

        .status-text.success {
            color: #3fb950;
        }

        .tasks-section {
            margin-bottom: 24px;
        }

        .task-card {
            background: #2d2d2d;
            border: 1px solid #444;
            border-left: 3px solid #555;
            border-radius: 6px;
            padding: 16px;
            margin-bottom: 12px;
            transition: all 0.2s;
        }

        .task-card.pending {
            border-left-color: #555;
        }

        .task-card.running {
            border-left-color: #f0a500;
        }

        .task-card.done {
            border-left-color: #3fb950;
        }

        .task-card.failed {
            border-left-color: #f85149;
        }

        .task-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 8px;
        }

        .task-title {
            font-size: 15px;
            font-weight: 600;
            flex: 1;
        }

        .task-badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
            margin-left: 12px;
        }

        .task-badge.pending {
            background: #555;
            color: #d4d4d4;
        }

        .task-badge.running {
            background: #3a3000;
            color: #f0a500;
        }

        .task-badge.done {
            background: #003a20;
            color: #3fb950;
        }

        .task-badge.failed {
            background: #3a0000;
            color: #f85149;
        }

        .task-description {
            font-size: 13px;
            color: #aaa;
            margin-bottom: 12px;
            line-height: 1.5;
        }

        .task-actions {
            display: flex;
            gap: 8px;
        }

        .btn-run {
            padding: 6px 12px;
            font-size: 12px;
        }

        .prompt-box {
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 4px;
            padding: 12px;
            margin-top: 12px;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            white-space: pre-wrap;
            word-wrap: break-word;
            color: #d4d4d4;
            max-height: 300px;
            overflow-y: auto;
        }

        .btn-copy {
            padding: 4px 8px;
            font-size: 11px;
            margin-top: 8px;
        }

        .run-all-section {
            margin-bottom: 24px;
            display: none;
        }

        .run-all-section.visible {
            display: block;
        }

        .history-section {
            margin-top: 32px;
            padding-top: 16px;
            border-top: 1px solid #333;
        }

        .history-toggle {
            color: #7c6af7;
            cursor: pointer;
            font-size: 14px;
            font-weight: 500;
            user-select: none;
        }

        .history-toggle:hover {
            text-decoration: underline;
        }

        .history-list {
            display: none;
            margin-top: 12px;
        }

        .history-list.visible {
            display: block;
        }

        .history-item {
            background: #2d2d2d;
            border: 1px solid #444;
            border-radius: 4px;
            padding: 10px 12px;
            margin-bottom: 8px;
            cursor: pointer;
            font-size: 13px;
            transition: all 0.2s;
        }

        .history-item:hover {
            background: #3a3a3a;
            border-color: #555;
        }

        .history-item-text {
            color: #d4d4d4;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .history-item-date {
            color: #888;
            font-size: 11px;
            margin-top: 4px;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #888;
        }

        .spinner {
            display: inline-block;
            width: 14px;
            height: 14px;
            border: 2px solid #444;
            border-top-color: #7c6af7;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <h1>⚡ Bob Task Orchestrator</h1>
        <div class="mock-badge" id="mockBadge">MOCK MODE</div>
    </div>

    <!-- Stats Bar -->
    <div id="statsBar" style="display:flex;gap:12px;margin-bottom:16px;padding:10px 12px;background:#2d2d2d;border-radius:6px;font-size:12px">
        <span>🎯 Goals: <b id="statGoals">0</b></span>
        <span>✅ Done: <b id="statDone">0</b></span>
        <span>📊 Rate: <b id="statRate">0%</b></span>
        <span>⏱ Saved: <b id="statSaved" style="color:#3fb950">0 mins</b></span>
    </div>

    <!-- Goal Input Section -->
    <div class="goal-input-section">
        <textarea 
            id="goalInput" 
            placeholder="Describe your developer goal…&#10;&#10;Example: Build a REST API for user management with authentication, CRUD operations, and PostgreSQL database"
        ></textarea>
        <button class="btn btn-primary" id="generateBtn" onclick="submitGoal()">
            ⚡ Generate Tasks
        </button>
        <div class="status-text" id="statusText"></div>
    </div>

    <!-- Run All Section -->
    <div class="run-all-section" id="runAllSection">
        <button class="btn btn-secondary" id="runAllBtn" onclick="runAll()">
            ▶ Run All Tasks
        </button>
    </div>

    <!-- Tasks Section -->
    <div class="tasks-section" id="tasksSection">
        <div class="empty-state">
            Enter a goal above to generate tasks
        </div>
    </div>

    <!-- Past Goals Section -->
    <div class="history-section">
        <div class="history-toggle" onclick="toggleHistory()">
            <span id="historyToggleIcon">▸</span> Past Goals
        </div>
        <div class="history-list" id="historyList"></div>
    </div>

    <script>
        // API Configuration
        const API = 'http://localhost:8000';
        
        // Global State
        let currentGoalId = null;
        let pollingInterval = null;
        let isRunningAll = false;

        // Initialize on page load
        window.addEventListener('DOMContentLoaded', () => {
            checkHealth();
            loadPastGoals();
            loadStats();
        });

        // Load statistics
        async function loadStats() {
            try {
                const res = await fetch(`${API}/stats`);
                const s = await res.json();
                document.getElementById('statGoals').textContent = s.total_goals;
                document.getElementById('statDone').textContent = s.completed_tasks;
                document.getElementById('statRate').textContent = s.completion_rate + '%';
                document.getElementById('statSaved').textContent = s.time_saved_minutes + ' mins';
            } catch(e) {}
        }

        // Check API health and mock mode
        async function checkHealth() {
            try {
                const response = await fetch(`${API}/health`);
                const data = await response.json();
                
                if (data.mock_mode) {
                    document.getElementById('mockBadge').classList.add('visible');
                }
            } catch (error) {
                console.error('Health check failed:', error);
            }
        }

        // Submit goal and generate tasks
        async function submitGoal() {
            const goalInput = document.getElementById('goalInput');
            const generateBtn = document.getElementById('generateBtn');
            const statusText = document.getElementById('statusText');
            
            const goalText = goalInput.value.trim();
            if (!goalText) {
                statusText.textContent = 'Please enter a goal';
                statusText.className = 'status-text error';
                return;
            }

            // Disable input during generation
            generateBtn.disabled = true;
            goalInput.disabled = true;
            statusText.innerHTML = '<span class="spinner"></span>Generating tasks with AI...';
            statusText.className = 'status-text';

            try {
                const response = await fetch(`${API}/goals`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: goalText })
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const data = await response.json();
                currentGoalId = data.goal_id;
                
                // Render tasks
                renderTasks(data.tasks);
                
                // Show success
                statusText.textContent = `✓ Generated ${data.tasks.length} tasks`;
                statusText.className = 'status-text success';
                
                // Clear input
                goalInput.value = '';
                
                // Reload past goals
                loadPastGoals();
                
                // Start polling for updates
                startPolling();
                
            } catch (error) {
                statusText.textContent = `Error: ${error.message}`;
                statusText.className = 'status-text error';
            } finally {
                generateBtn.disabled = false;
                goalInput.disabled = false;
            }
        }

        // Render tasks in the UI
        function renderTasks(tasks) {
            const tasksSection = document.getElementById('tasksSection');
            const runAllSection = document.getElementById('runAllSection');
            
            if (!tasks || tasks.length === 0) {
                tasksSection.innerHTML = '<div class="empty-state">No tasks generated</div>';
                runAllSection.classList.remove('visible');
                return;
            }

            // Sort by order
            tasks.sort((a, b) => a.order - b.order);

            // Build HTML
            const html = tasks.map(task => {
                const statusClass = task.status || 'pending';
                const promptHtml = task.bob_prompt ? `
                    <div class="prompt-box">${escapeHtml(task.bob_prompt)}</div>
                    <button class="btn btn-secondary btn-copy" onclick="copyPrompt(${task.id})">
                        📋 Copy Prompt
                    </button>
                ` : '';

                return `
                    <div class="task-card ${statusClass}" data-task-id="${task.id}">
                        <div class="task-header">
                            <div class="task-title">${escapeHtml(task.title)}</div>
                            <div class="task-badge ${statusClass}">${statusClass}</div>
                        </div>
                        <div class="task-description">${escapeHtml(task.description)}</div>
                        <div class="task-actions">
                            <button 
                                class="btn btn-primary btn-run" 
                                onclick="runTask(${task.id})"
                                ${statusClass !== 'pending' ? 'disabled' : ''}
                            >
                                Run in Bob ↗
                            </button>
                        </div>
                        ${promptHtml}
                    </div>
                `;
            }).join('');

            tasksSection.innerHTML = html;
            runAllSection.classList.add('visible');
        }

        // Send prompt to Bob IDE chat
        function sendToBobChat(prompt, taskId) {
            // Method 1: Bob IDE extension API (if running as Bob plugin)
            if (window.acquireVsCodeApi) {
                const vscode = window.acquireVsCodeApi();
                vscode.postMessage({
                    type: 'sendToChat',
                    prompt: prompt,
                    taskId: taskId
                });
                return true;
            }
            
            // Method 2: postMessage to parent (if in iframe)
            if (window.parent !== window) {
                window.parent.postMessage({
                    type: 'bob-chat-prompt',
                    prompt: prompt
                }, '*');
                return true;
            }
            
            // Method 3: Auto copy to clipboard (browser fallback)
            navigator.clipboard.writeText(prompt).then(() => {
                const statusText = document.getElementById('statusText');
                statusText.textContent = '✓ Prompt copied — paste into Bob chat with Ctrl+V';
                statusText.className = 'status-text success';
            });
            return false;
        }

        // Run a single task
        async function runTask(taskId) {
            const taskCard = document.querySelector(`[data-task-id="${taskId}"]`);
            if (!taskCard) return;

            const runBtn = taskCard.querySelector('.btn-run');
            const originalBtnText = runBtn.textContent;
            const originalBtnBg = runBtn.style.background;
            
            // Update button to show sending state
            runBtn.disabled = true;
            runBtn.textContent = 'Sending to Bob...';
            runBtn.style.background = '#f0a500';

            try {
                const response = await fetch(`${API}/tasks/${taskId}/run`, {
                    method: 'POST'
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.detail || 'Failed to run task');
                }

                const data = await response.json();
                
                // Send prompt to Bob chat immediately after task completes
                if (data.bob_prompt && data.status === 'done') {
                    sendToBobChat(data.bob_prompt, taskId);
                    
                    // Update button to show success
                    runBtn.textContent = '✓ Copied to Bob';
                    runBtn.style.background = '#3fb950';
                    
                    // Reset button after 3 seconds
                    setTimeout(() => {
                        runBtn.textContent = originalBtnText;
                        runBtn.style.background = originalBtnBg;
                    }, 3000);
                }
                
                // Refresh tasks to show updated status and prompt
                if (currentGoalId) {
                    await refreshTasks();
                }
                
                // Reload stats after task completion
                loadStats();
                
            } catch (error) {
                alert(`Error running task: ${error.message}`);
                runBtn.textContent = originalBtnText;
                runBtn.style.background = originalBtnBg;
                runBtn.disabled = false;
            }
        }

        // Run all pending tasks sequentially
        async function runAll() {
            if (isRunningAll) return;
            
            const runAllBtn = document.getElementById('runAllBtn');
            const statusText = document.getElementById('statusText');
            
            // Get all pending tasks
            const pendingTasks = Array.from(document.querySelectorAll('.task-card.pending'))
                .map(card => parseInt(card.dataset.taskId));
            
            if (pendingTasks.length === 0) {
                statusText.textContent = 'No pending tasks to run';
                statusText.className = 'status-text';
                return;
            }

            isRunningAll = true;
            runAllBtn.disabled = true;

            for (let i = 0; i < pendingTasks.length; i++) {
                const taskId = pendingTasks[i];
                statusText.innerHTML = `<span class="spinner"></span>Running task ${i + 1} of ${pendingTasks.length}...`;
                statusText.className = 'status-text';
                
                try {
                    await runTask(taskId);
                    // Wait a bit for the task to complete
                    await new Promise(resolve => setTimeout(resolve, 1500));
                } catch (error) {
                    console.error(`Failed to run task ${taskId}:`, error);
                }
            }

            statusText.textContent = '✓ All tasks completed';
            statusText.className = 'status-text success';
            isRunningAll = false;
            runAllBtn.disabled = false;
        }

        // Copy prompt to clipboard
        async function copyPrompt(taskId) {
            const taskCard = document.querySelector(`[data-task-id="${taskId}"]`);
            const promptBox = taskCard.querySelector('.prompt-box');
            
            if (!promptBox) return;

            try {
                await navigator.clipboard.writeText(promptBox.textContent);
                
                // Show feedback
                const copyBtn = taskCard.querySelector('.btn-copy');
                const originalText = copyBtn.textContent;
                copyBtn.textContent = '✓ Copied!';
                setTimeout(() => {
                    copyBtn.textContent = originalText;
                }, 2000);
            } catch (error) {
                alert('Failed to copy to clipboard');
            }
        }

        // Toggle history section
        function toggleHistory() {
            const historyList = document.getElementById('historyList');
            const icon = document.getElementById('historyToggleIcon');
            
            if (historyList.classList.contains('visible')) {
                historyList.classList.remove('visible');
                icon.textContent = '▸';
            } else {
                historyList.classList.add('visible');
                icon.textContent = '▾';
                loadPastGoals();
            }
        }

        // Load past goals from API
        async function loadPastGoals() {
            try {
                const response = await fetch(`${API}/goals`);
                const goals = await response.json();
                
                const historyList = document.getElementById('historyList');
                
                if (!goals || goals.length === 0) {
                    historyList.innerHTML = '<div class="empty-state">No past goals yet</div>';
                    return;
                }

                // Take last 20 goals
                const recentGoals = goals.slice(0, 20);
                
                const html = recentGoals.map(goal => {
                    const date = new Date(goal.created_at).toLocaleString();
                    return `
                        <div class="history-item" data-goal-id="${goal.id}" onclick="loadGoalFromElement(this)">
                            <div class="history-item-text">${escapeHtml(goal.text)}</div>
                            <div class="history-item-date">${date} • ${goal.task_count} tasks • ${goal.completed_tasks} done</div>
                        </div>
                    `;
                }).join('');
                
                historyList.innerHTML = html;
                
            } catch (error) {
                console.error('Failed to load past goals:', error);
            }
        }

        // Load goal from history element (safer than inline onclick with string interpolation)
        function loadGoalFromElement(el) {
            const goalId = parseInt(el.dataset.goalId);
            const goalText = el.querySelector('.history-item-text').textContent;
            loadGoal(goalId, goalText);
        }

        // Load tasks for a specific goal
        async function loadGoal(goalId, goalText) {
            currentGoalId = goalId;
            
            const statusText = document.getElementById('statusText');
            statusText.innerHTML = '<span class="spinner"></span>Loading tasks...';
            statusText.className = 'status-text';

            try {
                const response = await fetch(`${API}/goals/${goalId}/tasks`);
                const tasks = await response.json();
                
                renderTasks(tasks);
                statusText.textContent = `Loaded: ${goalText.substring(0, 50)}...`;
                statusText.className = 'status-text success';
                
                // Start polling
                startPolling();
                
            } catch (error) {
                statusText.textContent = `Error loading goal: ${error.message}`;
                statusText.className = 'status-text error';
            }
        }

        // Refresh current tasks
        async function refreshTasks() {
            if (!currentGoalId) return;
            
            try {
                const response = await fetch(`${API}/goals/${currentGoalId}/tasks`);
                const tasks = await response.json();
                renderTasks(tasks);
                
                // Check if we should stop polling
                const hasActiveTask = tasks.some(t => t.status === 'pending' || t.status === 'running');
                if (!hasActiveTask) {
                    stopPolling();
                }
            } catch (error) {
                console.error('Failed to refresh tasks:', error);
            }
        }

        // Start polling for task updates
        function startPolling() {
            stopPolling(); // Clear any existing interval
            pollingInterval = setInterval(refreshTasks, 2000);
        }

        // Stop polling
        function stopPolling() {
            if (pollingInterval) {
                clearInterval(pollingInterval);
                pollingInterval = null;
            }
        }

        // Utility: Escape HTML
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
