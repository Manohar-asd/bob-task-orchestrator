<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bob Task Orchestrator</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #141414;
            color: #e0e0e0;
            padding: 20px;
            line-height: 1.5;
        }

        /* Header */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .header-icon {
            width: 28px;
            height: 28px;
            background: #5b4fe8;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 16px;
        }

        .header-title {
            font-size: 16px;
            font-weight: 600;
            color: #e0e0e0;
        }

        .status-badge {
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .status-badge.live {
            background: #003a20;
            color: #3fb950;
        }

        .status-badge.mock {
            background: #3a3000;
            color: #f0a500;
        }

        /* Stats Bar */
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            margin-bottom: 20px;
        }

        .stat-card {
            background: #1e1e1e;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            padding: 12px;
            text-align: center;
        }

        .stat-value {
            font-size: 18px;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 4px;
        }

        .stat-value.green {
            color: #3fb950;
        }

        .stat-label {
            font-size: 10px;
            text-transform: uppercase;
            color: #555;
            letter-spacing: 0.5px;
        }

        /* Input Section */
        .input-section {
            margin-bottom: 20px;
        }

        textarea {
            width: 100%;
            height: 68px;
            padding: 12px;
            background: #1e1e1e;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            color: #e0e0e0;
            font-family: inherit;
            font-size: 13px;
            resize: none;
            margin-bottom: 12px;
            transition: border-color 0.2s;
        }

        textarea:focus {
            outline: none;
            border-color: #5b4fe8;
        }

        textarea::placeholder {
            color: #555;
        }

        .button-row {
            display: flex;
            gap: 8px;
        }

        .btn {
            padding: 10px 16px;
            border: none;
            border-radius: 6px;
            font-size: 13px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .btn-primary {
            background: #5b4fe8;
            color: white;
            flex: 1;
        }

        .btn-primary:hover:not(:disabled) {
            background: #4a3ed7;
        }

        .btn-secondary {
            background: #1e1e1e;
            color: #e0e0e0;
            border: 1px solid #2a2a2a;
        }

        .btn-secondary:hover:not(:disabled) {
            background: #242424;
        }

        .status-line {
            margin-top: 12px;
            font-size: 12px;
            color: #888;
            min-height: 18px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-line.success {
            color: #3fb950;
        }

        .status-line.error {
            color: #f85149;
        }

        .status-dot {
            width: 6px;
            height: 6px;
            background: #3fb950;
            border-radius: 50%;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        /* Task Cards */
        .tasks-section {
            margin-bottom: 24px;
        }

        .task-card {
            background: #1a1a1a;
            border: 1px solid #242424;
            border-left: 3px solid #333;
            border-radius: 8px;
            padding: 16px;
            margin-bottom: 12px;
            transition: all 0.2s;
        }

        .task-card:hover {
            border-color: #2a2a2a;
        }

        .task-card.pending {
            border-left-color: #333;
        }

        .task-card.running {
            border-left-color: #f0a500;
        }

        .task-card.done {
            border-left-color: #3fb950;
        }

        .task-card.failed {
            border-left-color: #f85149;
        }

        .task-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 8px;
        }

        .task-title-row {
            display: flex;
            align-items: center;
            gap: 10px;
            flex: 1;
        }

        .task-number {
            font-size: 11px;
            color: #555;
            font-weight: 600;
            min-width: 20px;
        }

        .task-title {
            font-size: 14px;
            font-weight: 600;
            color: #e0e0e0;
        }

        .task-badge {
            padding: 3px 8px;
            border-radius: 4px;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .task-badge.pending {
            background: #1e1e1e;
            color: #666;
        }

        .task-badge.running {
            background: #3a3000;
            color: #f0a500;
        }

        .task-badge.done {
            background: #003a20;
            color: #3fb950;
        }

        .task-badge.failed {
            background: #3a0000;
            color: #f85149;
        }

        .task-description {
            font-size: 12px;
            color: #666;
            margin-bottom: 12px;
            line-height: 1.6;
        }

        .task-meta {
            font-size: 11px;
            color: #555;
            margin-bottom: 12px;
        }

        .task-actions {
            display: flex;
            gap: 8px;
            margin-bottom: 12px;
        }

        .btn-run {
            padding: 6px 12px;
            font-size: 12px;
            background: transparent;
            border: 1px solid #2a2a2a;
            color: #e0e0e0;
        }

        .btn-run:hover:not(:disabled) {
            border-color: #5b4fe8;
            color: #5b4fe8;
        }

        .btn-run.success {
            background: #003a20;
            border-color: #3fb950;
            color: #3fb950;
        }

        .prompt-container {
            margin-top: 12px;
        }

        .prompt-box {
            background: #111;
            border: 1px solid #1e1e1e;
            border-radius: 6px;
            padding: 12px;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            color: #aaa;
            max-height: 80px;
            overflow-y: auto;
            position: relative;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .prompt-box::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 20px;
            background: linear-gradient(transparent, #111);
            pointer-events: none;
        }

        .btn-copy {
            margin-top: 8px;
            padding: 4px 10px;
            font-size: 11px;
            background: transparent;
            border: 1px solid #1e1e1e;
            color: #666;
        }

        .btn-copy:hover:not(:disabled) {
            border-color: #2a2a2a;
            color: #e0e0e0;
        }

        /* History Section */
        .history-section {
            margin-top: 32px;
            padding-top: 20px;
            border-top: 1px solid #1e1e1e;
        }

        .history-toggle {
            color: #444;
            cursor: pointer;
            font-size: 13px;
            font-weight: 500;
            user-select: none;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .history-toggle:hover {
            color: #666;
        }

        .history-list {
            display: none;
            margin-top: 12px;
        }

        .history-list.visible {
            display: block;
        }

        .history-item {
            background: #1a1a1a;
            border: 1px solid #242424;
            border-radius: 6px;
            padding: 12px;
            margin-bottom: 8px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .history-item:hover {
            background: #1e1e1e;
            border-color: #2a2a2a;
        }

        .history-item-text {
            color: #e0e0e0;
            font-size: 13px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            margin-bottom: 4px;
        }

        .history-item-meta {
            color: #555;
            font-size: 11px;
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #555;
            font-size: 13px;
        }

        /* Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }

        ::-webkit-scrollbar-track {
            background: #141414;
        }

        ::-webkit-scrollbar-thumb {
            background: #2a2a2a;
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #333;
        }
    </style>
</head>
<body>
    <!-- Header -->
    <div class="header">
        <div class="header-left">
            <div class="header-icon">⚡</div>
            <div class="header-title">Bob Task Orchestrator</div>
        </div>
        <div class="status-badge live" id="statusBadge">LIVE — GRANITE</div>
    </div>

    <!-- Stats Bar -->
    <div class="stats-bar">
        <div class="stat-card">
            <div class="stat-value" id="statGoals">0</div>
            <div class="stat-label">Goals</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="statDone">0</div>
            <div class="stat-label">Tasks Done</div>
        </div>
        <div class="stat-card">
            <div class="stat-value" id="statRate">0%</div>
            <div class="stat-label">Completion</div>
        </div>
        <div class="stat-card">
            <div class="stat-value green" id="statSaved">0 mins</div>
            <div class="stat-label">Time Saved</div>
        </div>
    </div>

    <!-- Input Section -->
    <div class="input-section">
        <textarea 
            id="goalInput" 
            placeholder="Describe your developer goal…&#10;&#10;Example: Build a REST API for user management with authentication, CRUD operations, and PostgreSQL database"
        ></textarea>
        <div class="button-row">
            <button class="btn btn-primary" id="generateBtn" onclick="submitGoal()">
                ⚡ Generate Tasks
            </button>
            <button class="btn btn-secondary" id="runAllBtn" onclick="runAll()">
                ▶ Run All
            </button>
        </div>
        <div class="status-line" id="statusLine"></div>
    </div>

    <!-- Tasks Section -->
    <div class="tasks-section" id="tasksSection">
        <div class="empty-state">
            Enter a goal above to generate tasks
        </div>
    </div>

    <!-- History Section -->
    <div class="history-section">
        <div class="history-toggle" onclick="toggleHistory()">
            <span id="historyToggleIcon">▸</span>
            <span id="historyToggleText">Past goals</span>
        </div>
        <div class="history-list" id="historyList"></div>
    </div>

    <script>
        // API Configuration
        const API = 'http://localhost:8000';
        
        // Global State
        let currentGoalId = null;
        let pollingInterval = null;
        let statsInterval = null;
        let isRunningAll = false;

        // Initialize on page load
        window.addEventListener('DOMContentLoaded', () => {
            checkHealth();
            loadPastGoals();
            loadStats();
            startStatsPolling();
        });

        // Start polling stats every 10 seconds
        function startStatsPolling() {
            statsInterval = setInterval(loadStats, 10000);
        }

        // Load statistics
        async function loadStats() {
            try {
                const res = await fetch(`${API}/stats`);
                const s = await res.json();
                document.getElementById('statGoals').textContent = s.total_goals;
                document.getElementById('statDone').textContent = s.completed_tasks;
                document.getElementById('statRate').textContent = s.completion_rate + '%';
                document.getElementById('statSaved').textContent = s.time_saved_minutes + ' mins';
            } catch(e) {
                console.error('Failed to load stats:', e);
            }
        }

        // Check API health and mock mode
        async function checkHealth() {
            try {
                const response = await fetch(`${API}/health`);
                const data = await response.json();
                
                const badge = document.getElementById('statusBadge');
                if (data.mock_mode) {
                    badge.textContent = 'MOCK MODE';
                    badge.className = 'status-badge mock';
                } else {
                    badge.textContent = 'LIVE — GRANITE';
                    badge.className = 'status-badge live';
                }
            } catch (error) {
                console.error('Health check failed:', error);
            }
        }

        // Submit goal and generate tasks
        async function submitGoal() {
            const goalInput = document.getElementById('goalInput');
            const generateBtn = document.getElementById('generateBtn');
            const statusLine = document.getElementById('statusLine');
            
            const goalText = goalInput.value.trim();
            if (!goalText) {
                statusLine.innerHTML = 'Please enter a goal';
                statusLine.className = 'status-line error';
                return;
            }

            // Disable input during generation
            generateBtn.disabled = true;
            goalInput.disabled = true;
            statusLine.innerHTML = '<span class="status-dot"></span>Generating tasks with AI...';
            statusLine.className = 'status-line';

            try {
                const response = await fetch(`${API}/goals`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: goalText })
                });

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }

                const data = await response.json();
                currentGoalId = data.goal_id;
                
                // Render tasks
                renderTasks(data.tasks);
                
                // Show success
                statusLine.textContent = `✓ Generated ${data.tasks.length} tasks`;
                statusLine.className = 'status-line success';
                
                // Clear input
                goalInput.value = '';
                
                // Reload past goals and stats
                loadPastGoals();
                loadStats();
                
                // Start polling for updates
                startPolling();
                
            } catch (error) {
                statusLine.textContent = `Error: ${error.message}`;
                statusLine.className = 'status-line error';
            } finally {
                generateBtn.disabled = false;
                goalInput.disabled = false;
            }
        }

        // Render tasks in the UI
        function renderTasks(tasks) {
            const tasksSection = document.getElementById('tasksSection');
            
            if (!tasks || tasks.length === 0) {
                tasksSection.innerHTML = '<div class="empty-state">No tasks generated</div>';
                return;
            }

            // Sort by order
            tasks.sort((a, b) => a.order - b.order);

            // Build HTML
            const html = tasks.map((task, index) => {
                const statusClass = task.status || 'pending';
                const taskNumber = String(index + 1).padStart(2, '0');
                
                // Calculate time ago for completed tasks
                let timeAgo = '';
                if (task.status === 'done' && task.updated_at) {
                    const updated = new Date(task.updated_at);
                    const now = new Date();
                    const seconds = Math.floor((now - updated) / 1000);
                    if (seconds < 60) timeAgo = `${seconds}s ago`;
                    else if (seconds < 3600) timeAgo = `${Math.floor(seconds / 60)}m ago`;
                    else timeAgo = `${Math.floor(seconds / 3600)}h ago`;
                }
                
                const promptHtml = task.bob_prompt ? `
                    <div class="prompt-container">
                        <div class="prompt-box">${escapeHtml(task.bob_prompt)}</div>
                        <button class="btn btn-copy" onclick="copyPrompt(${task.id})">
                            📋 Copy prompt
                        </button>
                    </div>
                ` : '';

                return `
                    <div class="task-card ${statusClass}" data-task-id="${task.id}">
                        <div class="task-header">
                            <div class="task-title-row">
                                <div class="task-number">${taskNumber}</div>
                                <div class="task-title">${escapeHtml(task.title)}</div>
                            </div>
                            <div class="task-badge ${statusClass}">${statusClass}</div>
                        </div>
                        <div class="task-description">${escapeHtml(task.description)}</div>
                        ${timeAgo ? `<div class="task-meta">${timeAgo}</div>` : ''}
                        <div class="task-actions">
                            <button 
                                class="btn btn-run" 
                                onclick="runTask(${task.id})"
                                ${statusClass !== 'pending' ? 'disabled' : ''}
                            >
                                Run in Bob ↗
                            </button>
                        </div>
                        ${promptHtml}
                    </div>
                `;
            }).join('');

            tasksSection.innerHTML = html;
        }

        // Send prompt to Bob IDE chat
        function sendToBobChat(prompt, taskId) {
            // Method 1: Bob IDE extension API (if running as Bob plugin)
            if (window.acquireVsCodeApi) {
                const vscode = window.acquireVsCodeApi();
                vscode.postMessage({ 
                    type: 'sendToChat', 
                    prompt: prompt,
                    taskId: taskId 
                });
                return true;
            }
            
            // Method 2: postMessage to parent (if in iframe)
            if (window.parent !== window) {
                window.parent.postMessage({ 
                    type: 'bob-chat-prompt', 
                    prompt: prompt 
                }, '*');
                return true;
            }
            
            // Method 3: Auto copy to clipboard (browser fallback)
            navigator.clipboard.writeText(prompt).then(() => {
                const statusLine = document.getElementById('statusLine');
                statusLine.textContent = '✓ Prompt copied — paste into Bob chat with Ctrl+V';
                statusLine.className = 'status-line success';
            });
            return false;
        }

        // Run a single task
        async function runTask(taskId) {
            const taskCard = document.querySelector(`[data-task-id="${taskId}"]`);
            if (!taskCard) return;

            const runBtn = taskCard.querySelector('.btn-run');
            const originalBtnText = runBtn.textContent;
            
            // Update button to show sending state
            runBtn.disabled = true;
            runBtn.textContent = 'Sending to Bob...';

            try {
                const response = await fetch(`${API}/tasks/${taskId}/run`, {
                    method: 'POST'
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.detail || 'Failed to run task');
                }

                const data = await response.json();
                
                // Send prompt to Bob chat immediately after task completes
                if (data.bob_prompt && data.status === 'done') {
                    sendToBobChat(data.bob_prompt, taskId);
                    
                    // Update button to show success
                    runBtn.textContent = '✓ Sent to Bob';
                    runBtn.classList.add('success');
                    
                    // Reset button after 3 seconds
                    setTimeout(() => {
                        runBtn.textContent = originalBtnText;
                        runBtn.classList.remove('success');
                    }, 3000);
                }
                
                // Refresh tasks to show updated status and prompt
                if (currentGoalId) {
                    await refreshTasks();
                }
                
                // Reload stats after task completion
                loadStats();
                
            } catch (error) {
                alert(`Error running task: ${error.message}`);
                runBtn.textContent = originalBtnText;
                runBtn.disabled = false;
            }
        }

        // Run all pending tasks sequentially
        async function runAll() {
            if (isRunningAll) return;
            
            const runAllBtn = document.getElementById('runAllBtn');
            const statusLine = document.getElementById('statusLine');
            
            // Get all pending tasks
            const pendingTasks = Array.from(document.querySelectorAll('.task-card.pending'))
                .map(card => parseInt(card.dataset.taskId));
            
            if (pendingTasks.length === 0) {
                statusLine.textContent = 'No pending tasks to run';
                statusLine.className = 'status-line';
                return;
            }

            isRunningAll = true;
            runAllBtn.disabled = true;

            for (let i = 0; i < pendingTasks.length; i++) {
                const taskId = pendingTasks[i];
                statusLine.innerHTML = `<span class="status-dot"></span>Running task ${i + 1} of ${pendingTasks.length}...`;
                statusLine.className = 'status-line';
                
                try {
                    await runTask(taskId);
                    // Wait a bit for the task to complete
                    await new Promise(resolve => setTimeout(resolve, 1500));
                } catch (error) {
                    console.error(`Failed to run task ${taskId}:`, error);
                }
            }

            statusLine.textContent = '✓ All tasks completed';
            statusLine.className = 'status-line success';
            isRunningAll = false;
            runAllBtn.disabled = false;
        }

        // Copy prompt to clipboard
        async function copyPrompt(taskId) {
            const taskCard = document.querySelector(`[data-task-id="${taskId}"]`);
            const promptBox = taskCard.querySelector('.prompt-box');
            
            if (!promptBox) return;

            try {
                await navigator.clipboard.writeText(promptBox.textContent);
                
                // Show feedback
                const copyBtn = taskCard.querySelector('.btn-copy');
                const originalText = copyBtn.textContent;
                copyBtn.textContent = '✓ Copied!';
                setTimeout(() => {
                    copyBtn.textContent = originalText;
                }, 2000);
            } catch (error) {
                alert('Failed to copy to clipboard');
            }
        }

        // Toggle history section
        function toggleHistory() {
            const historyList = document.getElementById('historyList');
            const icon = document.getElementById('historyToggleIcon');
            
            if (historyList.classList.contains('visible')) {
                historyList.classList.remove('visible');
                icon.textContent = '▸';
            } else {
                historyList.classList.add('visible');
                icon.textContent = '▾';
                loadPastGoals();
            }
        }

        // Load past goals from API
        async function loadPastGoals() {
            try {
                const response = await fetch(`${API}/goals`);
                const goals = await response.json();
                
                const historyList = document.getElementById('historyList');
                const toggleText = document.getElementById('historyToggleText');
                
                if (!goals || goals.length === 0) {
                    historyList.innerHTML = '<div class="empty-state">No past goals yet</div>';
                    toggleText.textContent = 'Past goals';
                    return;
                }

                // Update toggle text with count
                toggleText.textContent = `Past goals (${goals.length} total)`;

                // Take last 20 goals
                const recentGoals = goals.slice(0, 20);
                
                const html = recentGoals.map(goal => {
                    const date = new Date(goal.created_at).toLocaleString();
                    return `
                        <div class="history-item" data-goal-id="${goal.id}" onclick="loadGoalFromElement(this)">
                            <div class="history-item-text">${escapeHtml(goal.text)}</div>
                            <div class="history-item-meta">${goal.task_count} tasks • ${goal.completed_tasks} done • ${date}</div>
                        </div>
                    `;
                }).join('');
                
                historyList.innerHTML = html;
                
            } catch (error) {
                console.error('Failed to load past goals:', error);
            }
        }

        // Load goal from history element
        function loadGoalFromElement(el) {
            const goalId = parseInt(el.dataset.goalId);
            const goalText = el.querySelector('.history-item-text').textContent;
            loadGoal(goalId, goalText);
        }

        // Load tasks for a specific goal
        async function loadGoal(goalId, goalText) {
            currentGoalId = goalId;
            
            const statusLine = document.getElementById('statusLine');
            statusLine.innerHTML = '<span class="status-dot"></span>Loading tasks...';
            statusLine.className = 'status-line';

            try {
                const response = await fetch(`${API}/goals/${goalId}/tasks`);
                const tasks = await response.json();
                
                renderTasks(tasks);
                statusLine.textContent = `Loaded: ${goalText.substring(0, 50)}...`;
                statusLine.className = 'status-line success';
                
                // Start polling
                startPolling();
                
            } catch (error) {
                statusLine.textContent = `Error loading goal: ${error.message}`;
                statusLine.className = 'status-line error';
            }
        }

        // Refresh current tasks
        async function refreshTasks() {
            if (!currentGoalId) return;
            
            try {
                const response = await fetch(`${API}/goals/${currentGoalId}/tasks`);
                const tasks = await response.json();
                renderTasks(tasks);
                
                // Check if we should stop polling
                const hasActiveTask = tasks.some(t => t.status === 'pending' || t.status === 'running');
                if (!hasActiveTask) {
                    stopPolling();
                }
            } catch (error) {
                console.error('Failed to refresh tasks:', error);
            }
        }

        // Start polling for task updates
        function startPolling() {
            stopPolling(); // Clear any existing interval
            pollingInterval = setInterval(refreshTasks, 2000);
        }

        // Stop polling
        function stopPolling() {
            if (pollingInterval) {
                clearInterval(pollingInterval);
                pollingInterval = null;
            }
        }

        // Utility: Escape HTML
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>
